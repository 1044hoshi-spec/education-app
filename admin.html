<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 - AppPortal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        #authOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .auth-box {
            background: var(--sidebar-bg);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .auth-box h2 { margin-bottom: 20px; }
        .auth-box input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            width: 100%;
        }
        .auth-box button {
            padding: 10px 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        #adminContent {
            display: none;
        }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box">
            <h2>🔐 管理者ログイン</h2>
            <input type="password" id="adminPassword" placeholder="パスワードを入力">
            <button id="loginBtn">ログイン</button>
            <p id="authError" style="color: var(--danger-color); margin-top: 10px; display: none;">パスワードが違います</p>
            <a href="index.html" style="display: block; margin-top: 15px; color: var(--text-secondary); text-decoration: none; font-size: 14px;">← ホームに戻る</a>
        </div>
    </div>

    <div class="app-layout" id="adminContent">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">🚀</div>
                <h2>AppPortal</h2>
            </div>
            
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <span class="icon">📁</span>
                    マイアプリ
                </a>
                <a href="#" class="nav-item active">
                    <span class="icon">⚙️</span>
                    管理画面
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1>管理画面</h1>
                <p class="subtitle">ユーザーから申請されたアプリの承認と管理</p>
            </header>
            
            <ul class="admin-list" id="adminAppList">
                <div class="empty-state">読み込み中...</div>
            </ul>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginBtn = document.getElementById('loginBtn');
            const passwordInput = document.getElementById('adminPassword');
            const authError = document.getElementById('authError');
            const authOverlay = document.getElementById('authOverlay');
            const adminContent = document.getElementById('adminContent');

            function performLogin() {
                if (passwordInput.value === 'kanrisya') {
                    authOverlay.style.display = 'none';
                    adminContent.style.display = 'flex';
                    renderAdminList(); // Listen to Firestore realtime updates
                } else {
                    authError.style.display = 'block';
                }
            }

            loginBtn.addEventListener('click', performLogin);

            passwordInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    performLogin();
                }
            });

            function renderAdminList() {
                const listEl = document.getElementById('adminAppList');
                
                // Firestore realtime listener
                db.collection("apps").orderBy("createdAt", "desc").onSnapshot((querySnapshot) => {
                    listEl.innerHTML = '';
                    if (querySnapshot.empty) {
                        listEl.innerHTML = '<div class="empty-state">申請されているアプリはありません。</div>';
                        return;
                    }

                    querySnapshot.forEach((doc) => {
                        const app = doc.data();
                        const id = doc.id; // Document ID
                        const li = document.createElement('li');
                        li.className = 'admin-card';
                        
                        const isPending = app.status === 'pending';
                        const badgeClass = isPending ? 'pending' : 'approved';
                        const statusText = isPending ? '承認待ち' : '承認済';

                        const iconMap = {
                            notebook: '📓', calculator: '🧮', ruler: '📏', eraser: '🧽', pencil: '✏️', scissors: '✂️', microscope: '🔬', palette: '🎨', book: '📖',
                            dog: '🐶', cat: '🐱', fox: '🦊', bear: '🐻', panda: '🐼', lion: '🦁', frog: '🐸', penguin: '🐧', monkey: '🐵',
                            tree: '🌲', palm: '🌴', cactus: '🌵', tulip: '🌷', cherryblossom: '🌸', sunflower: '🌻', mushroom: '🍄',
                            apple: '🍎', banana: '🍌', strawberry: '🍓', pizza: '🍕', burger: '🍔', sushi: '🍣', onigiri: '🍙', cake: '🍰', donut: '🍩'
                        };
                        let icon = iconMap[app.type] || '📦';
                        
                        let approveButtonHtml = '';
                        if (isPending) {
                            approveButtonHtml = `<button class="btn btn-success" onclick="updateStatus('${id}', 'approved')">承認</button>`;
                        }
                        
                        li.innerHTML = `
                            <div class="admin-info">
                                <h3>
                                    <span class="badge ${badgeClass}">${statusText}</span>
                                    ${icon} ${app.name}
                                </h3>
                                <a href="${app.url}" target="_blank">${app.url}</a>
                                <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top:4px;">カテゴリ: ${app.type}</p>
                            </div>
                            <div class="admin-actions">
                                ${approveButtonHtml}
                                <button class="btn btn-danger" onclick="deleteApp('${id}')">削除</button>
                            </div>
                        `;
                        listEl.appendChild(li);
                    });
                }, (error) => {
                    console.error("Error fetching apps: ", error);
                    listEl.innerHTML = '<div class="empty-state" style="color:red;">データの読み込みに失敗しました。</div>';
                });
            }

            window.updateStatus = function(id, newStatus) {
                db.collection("apps").doc(id).update({
                    status: newStatus
                }).catch((error) => {
                    console.error("Error updating status: ", error);
                    alert("更新エラーが発生しました");
                });
            };

            window.deleteApp = function(id) {
                if(confirm('本当に削除しますか？')) {
                    db.collection("apps").doc(id).delete().catch((error) => {
                        console.error("Error removing document: ", error);
                        alert("削除エラーが発生しました");
                    });
                }
            };
        });
    </script>
</body>
</html>
