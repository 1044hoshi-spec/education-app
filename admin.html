<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 - AppPortal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        #authOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .auth-box {
            background: var(--sidebar-bg);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .auth-box h2 { margin-bottom: 20px; }
        .auth-box input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            width: 100%;
        }
        .auth-box button {
            padding: 10px 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        #adminContent {
            display: none;
        }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box">
            <h2>🔐 管理者ログイン</h2>
            <input type="password" id="adminPassword" placeholder="パスワードを入力">
            <button id="loginBtn">ログイン</button>
            <p id="authError" style="color: var(--danger-color); margin-top: 10px; display: none;">パスワードが違います</p>
            <a href="index.html" style="display: block; margin-top: 15px; color: var(--text-secondary); text-decoration: none; font-size: 14px;">← ホームに戻る</a>
        </div>
    </div>

    <div class="app-layout" id="adminContent">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">🚀</div>
                <h2>AppPortal</h2>
            </div>
            
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <span class="icon">📁</span>
                    マイアプリ
                </a>
                <a href="#" class="nav-item active">
                    <span class="icon">⚙️</span>
                    管理画面
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1>管理画面</h1>
                <p class="subtitle">ユーザーから申請されたアプリの承認と管理</p>
            </header>
            
            <ul class="admin-list" id="adminAppList">
                <!-- JS will populate this -->
            </ul>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginBtn = document.getElementById('loginBtn');
            const passwordInput = document.getElementById('adminPassword');
            const authError = document.getElementById('authError');
            const authOverlay = document.getElementById('authOverlay');
            const adminContent = document.getElementById('adminContent');

            function performLogin() {
                if (passwordInput.value === 'kanrisya') {
                    authOverlay.style.display = 'none';
                    adminContent.style.display = 'flex';
                    renderAdminList();
                } else {
                    authError.style.display = 'block';
                }
            }

            loginBtn.addEventListener('click', performLogin);

            passwordInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    performLogin();
                }
            });

            function renderAdminList() {
                const listEl = document.getElementById('adminAppList');
                listEl.innerHTML = '';
                const allApps = JSON.parse(localStorage.getItem('schoolApps') || '[]');
                
                if (allApps.length === 0) {
                    listEl.innerHTML = '<div class="empty-state">申請されているアプリはありません。</div>';
                    return;
                }

                allApps.forEach(app => {
                    const li = document.createElement('li');
                    li.className = 'admin-card';
                    
                    const isPending = app.status === 'pending';
                    const badgeClass = isPending ? 'pending' : 'approved';
                    const statusText = isPending ? '承認待ち' : '承認済';

                    const iconMap = {
                        notebook: '📓', calculator: '🧮', ruler: '📏', eraser: '🧽', pencil: '✏️', scissors: '✂️', microscope: '🔬', palette: '🎨', book: '📖',
                        dog: '🐶', cat: '🐱', fox: '🦊', bear: '🐻', panda: '🐼', lion: '🦁', frog: '🐸', penguin: '🐧', monkey: '🐵',
                        tree: '🌲', palm: '🌴', cactus: '🌵', tulip: '🌷', cherryblossom: '🌸', sunflower: '🌻', mushroom: '🍄',
                        apple: '🍎', banana: '🍌', strawberry: '🍓', pizza: '🍕', burger: '🍔', sushi: '🍣', onigiri: '🍙', cake: '🍰', donut: '🍩'
                    };
                    let icon = iconMap[app.type] || '📦';
                    
                    let approveButtonHtml = '';
                    if (isPending) {
                        approveButtonHtml = `<button class="btn btn-success" onclick="updateStatus(${app.id}, 'approved')">承認</button>`;
                    }
                    
                    li.innerHTML = `
                        <div class="admin-info">
                            <h3>
                                <span class="badge ${badgeClass}">${statusText}</span>
                                ${icon} ${app.name}
                            </h3>
                            <a href="${app.url}" target="_blank">${app.url}</a>
                            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top:4px;">カテゴリ: ${app.type}</p>
                        </div>
                        <div class="admin-actions">
                            ${approveButtonHtml}
                            <button class="btn btn-danger" onclick="deleteApp(${app.id})">削除</button>
                        </div>
                    `;
                    listEl.appendChild(li);
                });
            }

            window.updateStatus = function(id, newStatus) {
                const allApps = JSON.parse(localStorage.getItem('schoolApps') || '[]');
                const app = allApps.find(a => a.id === id);
                if(app) {
                    app.status = newStatus;
                    localStorage.setItem('schoolApps', JSON.stringify(allApps));
                    renderAdminList();
                }
            };

            window.deleteApp = function(id) {
                if(confirm('本当に削除しますか？')) {
                    let allApps = JSON.parse(localStorage.getItem('schoolApps') || '[]');
                    allApps = allApps.filter(a => a.id !== id);
                    localStorage.setItem('schoolApps', JSON.stringify(allApps));
                    renderAdminList();
                }
            };
            
            // We do NOT call renderAdminList here on load.
            // We only call it AFTER successful login.
        });
    </script>
</body>
</html>
